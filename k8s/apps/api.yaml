apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: menufacil
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: menufacil/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: menufacil-config
            - secretRef:
                name: menufacil-secrets
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: menufacil-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: menufacil
spec:
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
