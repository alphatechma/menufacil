apiVersion: apps/v1
kind: Deployment
metadata:
  name: super-admin
  namespace: menufacil
spec:
  replicas: 1
  selector:
    matchLabels:
      app: super-admin
  template:
    metadata:
      labels:
        app: super-admin
    spec:
      containers:
        - name: super-admin
          image: menufacil/super-admin:latest
          ports:
            - containerPort: 80
          env:
            - name: API_URL
              value: "http://api:3000"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: super-admin
  namespace: menufacil
spec:
  selector:
    app: super-admin
  ports:
    - port: 80
      targetPort: 80
