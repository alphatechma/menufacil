name: Desktop Build & Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `MenuFacil Desktop ${tag}`,
              body: 'See the assets to download and install this version.',
              draft: false,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  # Generate latest.json from release assets (fallback if tauri-action didn't)
  updater-json:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Generate latest.json from release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Check if tauri-action already created a valid latest.json
          mkdir -p /tmp/check
          gh release download "$TAG" --repo "$REPO" --pattern "latest.json" --dir /tmp/check 2>/dev/null || true
          if [ -f /tmp/check/latest.json ]; then
            PLATFORMS=$(python3 -c "import json; print(len(json.load(open('/tmp/check/latest.json')).get('platforms',{})))" 2>/dev/null || echo "0")
            if [ "$PLATFORMS" != "0" ]; then
              echo "tauri-action already created latest.json with $PLATFORMS platforms. Done!"
              cat /tmp/check/latest.json
              exit 0
            fi
          fi

          echo "Building latest.json manually from release assets..."

          # List all release assets
          echo "=== Release assets ==="
          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name'

          # Download .sig files from the release
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir /tmp/sigs 2>/dev/null || true
          echo "=== Downloaded .sig files ==="
          ls -la /tmp/sigs/ 2>/dev/null || echo "No .sig files in release"

          # If no .sig files in release, try to read them from the updater bundles
          SIG_COUNT=$(ls /tmp/sigs/*.sig 2>/dev/null | wc -l)

          python3 << PYEOF
          import json, os, glob

          version = "${VERSION}"
          tag = "${TAG}"
          base_url = "${BASE_URL}"
          date = "${DATE}"

          platforms = {}
          sigs_dir = "/tmp/sigs"

          for f in glob.glob(os.path.join(sigs_dir, "*.sig")):
              name = os.path.basename(f)
              with open(f) as fh:
                  sig = fh.read().strip()
              if not sig:
                  continue
              print(f"Found sig: {name}")

              if "AppImage.tar.gz.sig" in name and "menu-facil" not in name:
                  platforms["linux-x86_64"] = {"signature": sig, "url": f"{base_url}/MenuFacil_{version}_amd64.AppImage.tar.gz"}
              elif "app.tar.gz.sig" in name:
                  platforms["darwin-aarch64"] = {"signature": sig, "url": f"{base_url}/MenuFacil_universal.app.tar.gz"}
                  platforms["darwin-x86_64"] = {"signature": sig, "url": f"{base_url}/MenuFacil_universal.app.tar.gz"}
              elif "nsis.zip.sig" in name:
                  platforms["windows-x86_64"] = {"signature": sig, "url": f"{base_url}/MenuFacil_{version}_x64-setup.nsis.zip"}

          data = {"version": version, "notes": f"MenuFácil Desktop {tag}", "pub_date": date, "platforms": platforms}

          with open("/tmp/latest.json", "w") as f:
              json.dump(data, f, indent=2)

          print(f"\nGenerated latest.json with {len(platforms)} platform(s)")
          print(json.dumps(data, indent=2))
          PYEOF

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
          echo "Done!"
