name: Desktop Build & Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `MenuFacil Desktop ${tag}`,
              body: 'See the assets to download and install this version.',
              draft: false,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      - name: Upload .sig files and updater artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop-v}"

          # Find all .sig files
          for sigfile in $(find apps/desktop/src-tauri/target -name "*.sig" -type f 2>/dev/null); do
            filename=$(basename "$sigfile")
            echo "Uploading signature: $filename"
            gh release upload "$TAG" "$sigfile" --clobber || true
          done

          # Find and upload .tar.gz and .zip updater bundles
          for bundle in $(find apps/desktop/src-tauri/target \( -name "*.AppImage.tar.gz" -o -name "*.nsis.zip" -o -name "*.msi.zip" -o -name "*.app.tar.gz" \) -not -path "*/deps/*" 2>/dev/null); do
            filename=$(basename "$bundle")
            echo "Uploading bundle: $filename"
            gh release upload "$TAG" "$bundle" --clobber || true
          done

          echo "Upload step completed"

  updater-json:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Download all .sig files from the release
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir /tmp/sigs 2>/dev/null || true

          # Read signatures
          LINUX_SIG=""
          MACOS_SIG=""
          WIN_NSIS_SIG=""
          WIN_MSI_SIG=""

          for f in /tmp/sigs/*.sig; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            content=$(cat "$f")
            echo "Found sig: $name"

            case "$name" in
              *AppImage.tar.gz.sig) LINUX_SIG="$content" ;;
              *app.tar.gz.sig) MACOS_SIG="$content" ;;
              *nsis.zip.sig) WIN_NSIS_SIG="$content" ;;
              *setup.exe.sig) [ -z "$WIN_NSIS_SIG" ] && WIN_NSIS_SIG="$content" ;;
              *msi.zip.sig) WIN_MSI_SIG="$content" ;;
            esac
          done

          # Build latest.json
          cat > /tmp/latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "MenuFacil Desktop ${TAG}",
            "pub_date": "${DATE}",
            "platforms": {
          ENDJSON

          FIRST=true

          # Linux
          if [ -n "$LINUX_SIG" ]; then
            LINUX_URL="${BASE_URL}/MenuFacil_${VERSION}_amd64.AppImage.tar.gz"
            [ "$FIRST" = true ] && FIRST=false || echo "," >> /tmp/latest.json
            cat >> /tmp/latest.json << ENDJSON
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${LINUX_URL}"
              }
          ENDJSON
          fi

          # macOS
          if [ -n "$MACOS_SIG" ]; then
            MACOS_URL="${BASE_URL}/MenuFacil_universal.app.tar.gz"
            [ "$FIRST" = true ] && FIRST=false || echo "," >> /tmp/latest.json
            cat >> /tmp/latest.json << ENDJSON
              "darwin-aarch64": {
                "signature": "${MACOS_SIG}",
                "url": "${MACOS_URL}"
              },
              "darwin-x86_64": {
                "signature": "${MACOS_SIG}",
                "url": "${MACOS_URL}"
              }
          ENDJSON
          fi

          # Windows
          if [ -n "$WIN_NSIS_SIG" ]; then
            WIN_URL="${BASE_URL}/MenuFacil_${VERSION}_x64-setup.nsis.zip"
            [ "$FIRST" = true ] && FIRST=false || echo "," >> /tmp/latest.json
            cat >> /tmp/latest.json << ENDJSON
              "windows-x86_64": {
                "signature": "${WIN_NSIS_SIG}",
                "url": "${WIN_URL}"
              }
          ENDJSON
          fi

          cat >> /tmp/latest.json << 'ENDJSON'
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat /tmp/latest.json

          # Validate JSON
          python3 -c "import json; json.load(open('/tmp/latest.json'))" || {
            echo "ERROR: Invalid JSON"
            exit 1
          }

          # Upload
          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
          echo "Uploaded latest.json successfully!"
