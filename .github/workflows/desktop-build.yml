name: Desktop Build & Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `MenuFacil Desktop ${tag}`,
              body: 'See the assets to download and install this version.',
              draft: false,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  # Fallback: if tauri-action didn't generate latest.json, create it manually
  updater-json:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check and generate latest.json if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Check if latest.json already has platforms
          mkdir -p /tmp/check
          gh release download "$TAG" --repo "$REPO" --pattern "latest.json" --dir /tmp/check 2>/dev/null || true

          if [ -f /tmp/check/latest.json ]; then
            PLATFORMS=$(python3 -c "import json; d=json.load(open('/tmp/check/latest.json')); print(len(d.get('platforms',{})))" 2>/dev/null || echo "0")
            if [ "$PLATFORMS" != "0" ]; then
              echo "latest.json already has $PLATFORMS platforms, skipping"
              exit 0
            fi
          fi

          echo "latest.json missing or empty platforms, generating..."

          # Download all .sig files
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir /tmp/sigs 2>/dev/null || true

          # Read signatures
          LINUX_SIG=""
          MACOS_SIG=""
          WIN_NSIS_SIG=""

          for f in /tmp/sigs/*.sig; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            content=$(cat "$f")
            echo "Found sig: $name"
            case "$name" in
              *AppImage.tar.gz.sig) LINUX_SIG="$content" ;;
              *app.tar.gz.sig) MACOS_SIG="$content" ;;
              *nsis.zip.sig) WIN_NSIS_SIG="$content" ;;
              *setup.exe.sig) [ -z "$WIN_NSIS_SIG" ] && WIN_NSIS_SIG="$content" ;;
            esac
          done

          # If no sigs found, create a minimal latest.json with just version
          # (updater will report "up to date" instead of error)

          # Build JSON with python for reliability
          python3 << PYEOF
          import json

          platforms = {}

          linux_sig = """${LINUX_SIG}"""
          macos_sig = """${MACOS_SIG}"""
          win_sig = """${WIN_NSIS_SIG}"""

          if linux_sig.strip():
              platforms["linux-x86_64"] = {
                  "signature": linux_sig.strip(),
                  "url": "${BASE_URL}/MenuFacil_${VERSION}_amd64.AppImage.tar.gz"
              }
          if macos_sig.strip():
              platforms["darwin-aarch64"] = {
                  "signature": macos_sig.strip(),
                  "url": "${BASE_URL}/MenuFacil_universal.app.tar.gz"
              }
              platforms["darwin-x86_64"] = {
                  "signature": macos_sig.strip(),
                  "url": "${BASE_URL}/MenuFacil_universal.app.tar.gz"
              }
          if win_sig.strip():
              platforms["windows-x86_64"] = {
                  "signature": win_sig.strip(),
                  "url": "${BASE_URL}/MenuFacil_${VERSION}_x64-setup.nsis.zip"
              }

          data = {
              "version": "${VERSION}",
              "notes": "MenuFácil Desktop ${TAG}",
              "pub_date": "${DATE}",
              "platforms": platforms
          }

          with open("/tmp/latest.json", "w") as f:
              json.dump(data, f, indent=2)

          print(f"Generated latest.json with {len(platforms)} platforms")
          PYEOF

          cat /tmp/latest.json
          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
          echo "Uploaded latest.json"
