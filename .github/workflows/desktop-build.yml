name: Desktop Build & Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `MenuFacil Desktop ${tag}`,
              body: 'See the assets to download and install this version.',
              draft: false,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
            artifact_name: linux-sigs
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            artifact_name: macos-sigs
          - platform: windows-latest
            args: ''
            rust_targets: ''
            artifact_name: windows-sigs

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      - name: Collect signature and updater files
        shell: bash
        run: |
          mkdir -p /tmp/updater-artifacts
          find . -name "*.sig" -type f -not -path "*/node_modules/*" -not -path "*/deps/*" -exec cp {} /tmp/updater-artifacts/ \;
          find . \( -name "*.AppImage.tar.gz" -o -name "*.nsis.zip" -o -name "*.msi.zip" \) -not -path "*/node_modules/*" -not -path "*/deps/*" -exec cp {} /tmp/updater-artifacts/ \;
          echo "=== Collected files ==="
          ls -la /tmp/updater-artifacts/ || echo "No files found"

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: /tmp/updater-artifacts/
          if-no-files-found: warn
          retention-days: 1

  updater-json:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all signature artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all-sigs
          merge-multiple: true

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "=== Downloaded artifacts ==="
          ls -laR /tmp/all-sigs/ || echo "No artifacts"

          # Also upload .sig files to the release
          for f in /tmp/all-sigs/*.sig; do
            [ -f "$f" ] || continue
            echo "Uploading to release: $(basename $f)"
            gh release upload "$TAG" "$f" --repo "$REPO" --clobber || true
          done

          # Upload updater bundles too
          for f in /tmp/all-sigs/*.tar.gz /tmp/all-sigs/*.nsis.zip /tmp/all-sigs/*.msi.zip; do
            [ -f "$f" ] || continue
            echo "Uploading bundle: $(basename $f)"
            gh release upload "$TAG" "$f" --repo "$REPO" --clobber || true
          done

          # Read signatures for latest.json
          python3 << 'PYEOF'
          import json, os, glob

          sigs_dir = "/tmp/all-sigs"
          version = os.environ.get("VERSION", "0.0.0")
          tag = os.environ.get("TAG", "")
          base_url = os.environ.get("BASE_URL", "")
          date = os.environ.get("DATE", "")

          platforms = {}

          for f in glob.glob(os.path.join(sigs_dir, "*.sig")):
              name = os.path.basename(f)
              with open(f) as fh:
                  sig = fh.read().strip()
              if not sig:
                  continue

              print(f"Processing: {name}")

              if "AppImage.tar.gz.sig" in name:
                  platforms["linux-x86_64"] = {
                      "signature": sig,
                      "url": f"{base_url}/MenuFacil_{version}_amd64.AppImage.tar.gz"
                  }
              elif "app.tar.gz.sig" in name:
                  platforms["darwin-aarch64"] = {
                      "signature": sig,
                      "url": f"{base_url}/MenuFacil_universal.app.tar.gz"
                  }
                  platforms["darwin-x86_64"] = {
                      "signature": sig,
                      "url": f"{base_url}/MenuFacil_universal.app.tar.gz"
                  }
              elif "nsis.zip.sig" in name:
                  platforms["windows-x86_64"] = {
                      "signature": sig,
                      "url": f"{base_url}/MenuFacil_{version}_x64-setup.nsis.zip"
                  }
              elif "setup.exe.sig" in name and "windows-x86_64" not in platforms:
                  platforms["windows-x86_64"] = {
                      "signature": sig,
                      "url": f"{base_url}/MenuFacil_{version}_x64-setup.nsis.zip"
                  }

          data = {
              "version": version,
              "notes": f"MenuFácil Desktop {tag}",
              "pub_date": date,
              "platforms": platforms
          }

          with open("/tmp/latest.json", "w") as f:
              json.dump(data, f, indent=2)

          print(f"\nGenerated latest.json with {len(platforms)} platform(s):")
          print(json.dumps(data, indent=2))
          PYEOF

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
          echo "Done! latest.json uploaded."
