server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Headers de seguranca em todas as respostas.
    # O ingress-nginx do cluster tem snippets desabilitados — definindo aqui
    # garantimos o efeito independente da config do controller.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health endpoint para probes do k8s.
    location = /healthz {
        access_log off;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }

    # Runtime config gerado do ConfigMap k8s. NUNCA cacheado — mudancas de
    # env refletem no proximo refresh sem rebuild de bundle.
    location = /config.js {
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header Content-Type "application/javascript" always;
    }

    # Assets imutaveis (hash no nome via Vite) podem ser cacheados longamente.
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|webp|woff2?|ttf|otf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback: rotas desconhecidas caem no index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html nunca cacheado.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    error_page 500 502 503 504 /index.html;
}
