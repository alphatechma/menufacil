{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "static-frontend.name" . }}
  labels:
    {{- include "static-frontend.metaLabels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "static-frontend.selectorLabels" . | nindent 6 }}
{{- end }}
