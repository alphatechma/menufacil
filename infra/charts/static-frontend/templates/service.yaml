apiVersion: v1
kind: Service
metadata:
  name: {{ include "static-frontend.name" . }}
  labels:
    {{- include "static-frontend.metaLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "static-frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
