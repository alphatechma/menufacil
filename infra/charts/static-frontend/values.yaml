# Defaults do chart static-frontend. Cada app/ambiente sobrescreve via
# infra/apps/menufacil-<appName>/values-{prod,hml,dev}.yaml.
# Recurso final se chama menufacil-<appName>.

appName: ""            # web | manager | waiter

image:
  repository: ""       # ex: ghcr.io/maistech/menufacil-web
  tag: placeholder     # bumpado pelo CI por ambiente
  pullPolicy: IfNotPresent

replicas: 2

resources:
  requests:
    cpu: "20m"
    memory: "32Mi"
  limits:
    cpu: "300m"
    memory: "192Mi"

containerPort: 8080
healthPath: /healthz

ingress:
  enabled: true
  host: ""             # ex: app.menufacil.maistechtecnologia.com.br
  tlsSecret: ""        # ex: menufacil-web-tls
  clusterIssuer: letsencrypt-prod
  proxyBodySize: "2m"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

# Runtime config (config.js) servido pelo nginx em /usr/share/nginx/html/config.js.
# Vazio -> sem ConfigMap nem volume.
config:
  js: ""
