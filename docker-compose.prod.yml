version: '3.8'

# Reference for local production testing.
# On Easypanel, create each app as a separate service.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
    depends_on:
      - postgres
      - redis

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_CUSTOMER_URL: https://app.menufacil.com.br
    restart: unless-stopped
    ports:
      - '80:80'
    environment:
      API_URL: http://api:3000

  customer:
    build:
      context: .
      dockerfile: apps/customer/Dockerfile
    restart: unless-stopped
    ports:
      - '81:80'
    environment:
      API_URL: http://api:3000

  super-admin:
    build:
      context: .
      dockerfile: apps/super-admin/Dockerfile
    restart: unless-stopped
    ports:
      - '82:80'
    environment:
      API_URL: http://api:3000

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: menufacil
      POSTGRES_PASSWORD: menufacil123
      POSTGRES_DB: menufacil
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: menufacil
      MINIO_ROOT_PASSWORD: menufacil123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
