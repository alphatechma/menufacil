server:
  port: ${API_PORT:3001}
  servlet:
    context-path: /api

spring:
  application:
    name: menufacil-api
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:menufacil}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

# JWT
app:
  jwt:
    secret: ${JWT_SECRET:menufacil-jwt-secret-key-change-in-production}
    # Tempo de vida do access token (curto — protege em caso de vazamento).
    access-expiration: ${JWT_ACCESS_EXPIRATION:900000}      # 15min
    # Tempo de vida do refresh token (longo — usado para renovar o access via /auth/refresh).
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7d

# Swagger
springdoc:
  api-docs:
    path: /docs/api-docs
  swagger-ui:
    path: /docs
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: alpha

# MinIO / S3 (upload de imagens)
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost}
  port: ${MINIO_PORT:9000}
  use-ssl: ${MINIO_USE_SSL:false}
  access-key: ${MINIO_ACCESS_KEY:menufacil}
  secret-key: ${MINIO_SECRET_KEY:menufacil123}
  bucket: ${MINIO_BUCKET:menufacil}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}

# Evolution API (WhatsApp)
evolution:
  api:
    url: ${EVOLUTION_API_URL:http://localhost:8080}
    key: ${EVOLUTION_API_KEY:}
  webhook:
    url: ${EVOLUTION_WEBHOOK_URL:}

# AWS SES (Email)
aws:
  ses:
    region: ${AWS_SES_REGION:us-east-1}
    access-key: ${AWS_SES_ACCESS_KEY:}
    secret-key: ${AWS_SES_SECRET_KEY:}
    from-email: ${AWS_SES_FROM_EMAIL:noreply@menufacil.com.br}
    enabled: ${AWS_SES_ENABLED:false}

# Cleanup worker (TTL diario das tabelas de waits/notifications)
# Setar CLEANUP_ENABLED=false em dev para desabilitar o @Scheduled das 03h.
cleanup:
  enabled: ${CLEANUP_ENABLED:true}

# =============================================================================
# Observability
# =============================================================================

# Sentry — captura de exceções, breadcrumbs e performance trace.
# DSN vazio desativa o SDK (sem ruído em dev).
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:dev}
  release: ${SENTRY_RELEASE:menufacil-api@0.1.0}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  # Resolver chamado ANTES do GlobalExceptionHandler do Spring para
  # capturar a stack original (precedência mais alta possível).
  exception-resolver-order: -2147483647
  send-default-pii: false
  enable-tracing: true
  # Logback bridge: ERROR vai para Sentry como evento;
  # WARN/INFO vão como breadcrumb.
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

# Actuator — health, info, metrics + Prometheus scrape target.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: menufacil-api
      environment: ${SPRING_PROFILES_ACTIVE:dev}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

# OpenTelemetry — tracing distribuido (OTLP exporter).
# Endpoint vazio + exporters=none desativa em dev local.
otel:
  service:
    name: menufacil-api
  resource:
    attributes:
      service.namespace: menufacil
      deployment.environment: ${SPRING_PROFILES_ACTIVE:dev}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}
      protocol: ${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
    sampler:
      arg: ${OTEL_TRACES_SAMPLER_ARG:0.1}
  metrics:
    exporter: ${OTEL_METRICS_EXPORTER:none}
  logs:
    exporter: ${OTEL_LOGS_EXPORTER:none}

# Logging — texto padrao em dev; JSON em prod/hml (ver logback-spring.xml).
logging:
  level:
    root: INFO
    br.com.menufacil: DEBUG
    org.hibernate.SQL: WARN

---
# Perfil de produção
spring:
  config:
    activate:
      on-profile: prod
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none

logging:
  level:
    root: WARN
    br.com.menufacil: INFO
    org.hibernate.SQL: ERROR

---
# Perfil de homologação
spring:
  config:
    activate:
      on-profile: hml

logging:
  level:
    root: INFO
    br.com.menufacil: INFO
    org.hibernate.SQL: WARN
