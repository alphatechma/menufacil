version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: menufacil-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: menufacil
      POSTGRES_PASSWORD: menufacil123
      POSTGRES_DB: menufacil
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: menufacil-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: menufacil-pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@menufacil.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres

  minio:
    image: minio/minio
    container_name: menufacil-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: menufacil
      MINIO_ROOT_PASSWORD: menufacil123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
